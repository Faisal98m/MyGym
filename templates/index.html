<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>gym tracker</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #f5f5f4; color: #1a1a18; min-height: 100vh; }

  .header { background: #fff; border-bottom: 1px solid #e5e4e0; padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
  .header h1 { font-size: 16px; font-weight: 600; letter-spacing: -0.3px; }
  .today-date { font-size: 12px; color: #888; }

  .tab-bar { display: flex; background: #fff; border-bottom: 1px solid #e5e4e0; position: sticky; top: 53px; z-index: 9; }
  .tab { flex: 1; padding: 12px 0; font-size: 13px; font-weight: 500; text-align: center; cursor: pointer; color: #888; border-bottom: 2px solid transparent; background: none; border-top: none; border-left: none; border-right: none; }
  .tab.active { color: #1a1a18; border-bottom-color: #1a1a18; }

  .view { display: none; padding: 16px; }
  .view.active { display: block; }

  .day-pills { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 4px; margin-bottom: 16px; scrollbar-width: none; }
  .day-pills::-webkit-scrollbar { display: none; }
  .day-pill { flex-shrink: 0; padding: 6px 12px; font-size: 12px; font-weight: 500; border: 1px solid #ddd; border-radius: 20px; cursor: pointer; background: #fff; color: #555; white-space: nowrap; }
  .day-pill.active { background: #1a1a18; color: #fff; border-color: #1a1a18; }
  .day-pill.rest { opacity: 0.4; }

  .exercise-card { background: #fff; border-radius: 12px; border: 1px solid #e5e4e0; padding: 14px 16px; margin-bottom: 10px; }
  .exercise-name { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
  .exercise-note { font-size: 11px; color: #888; margin-bottom: 10px; }

  .sets-table { width: 100%; border-collapse: collapse; }
  .sets-table th { font-size: 11px; color: #aaa; font-weight: 500; padding: 0 6px 6px; text-align: center; }
  .sets-table th:first-child { text-align: left; width: 28px; }
  .sets-table td { padding: 4px 4px; text-align: center; border-top: 1px solid #f0efec; }
  .sets-table td:first-child { text-align: left; font-size: 12px; color: #aaa; padding-left: 0; }

  .set-input { width: 60px; padding: 6px 4px; font-size: 14px; border: 1px solid #e5e4e0; border-radius: 8px; text-align: center; background: #fafaf9; color: #1a1a18; }
  .set-input:focus { outline: none; border-color: #1a1a18; background: #fff; }

  .check-btn { width: 28px; height: 28px; border-radius: 8px; border: 1.5px solid #ddd; background: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; margin: 0 auto; transition: all 0.15s; }
  .check-btn.done { background: #1a1a18; border-color: #1a1a18; }
  .check-btn.done::after { content: ''; display: block; width: 10px; height: 6px; border-left: 2px solid #fff; border-bottom: 2px solid #fff; transform: rotate(-45deg) translateY(-1px); }

  .rest-card { background: #fff; border-radius: 12px; border: 1px solid #e5e4e0; padding: 40px 16px; text-align: center; color: #aaa; font-size: 14px; }

  .session-bar { position: sticky; bottom: 0; background: #fff; border-top: 1px solid #e5e4e0; padding: 12px 16px; display: flex; align-items: center; gap: 12px; }
  .complete-btn { flex: 1; padding: 13px; font-size: 14px; font-weight: 600; background: #1a1a18; color: #fff; border: none; border-radius: 10px; cursor: pointer; transition: opacity 0.15s; }
  .complete-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .sets-progress { font-size: 13px; color: #888; white-space: nowrap; }

  .adapt-banner { background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 10px; padding: 12px 14px; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .adapt-text { font-size: 13px; font-weight: 500; color: #15803d; }
  .adapt-sub { font-size: 11px; color: #4ade80; margin-top: 2px; }
  .adapt-actions { display: flex; gap: 6px; flex-shrink: 0; }
  .adapt-accept { padding: 5px 10px; font-size: 12px; font-weight: 500; background: #15803d; color: #fff; border: none; border-radius: 6px; cursor: pointer; }
  .adapt-dismiss { padding: 5px 10px; font-size: 12px; background: none; border: 1px solid #bbf7d0; color: #15803d; border-radius: 6px; cursor: pointer; }

  .prog-day { margin-bottom: 24px; }
  .prog-day-title { font-size: 13px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
  .prog-table { width: 100%; background: #fff; border-radius: 12px; border: 1px solid #e5e4e0; overflow: hidden; border-collapse: collapse; }
  .prog-table th { font-size: 11px; color: #aaa; font-weight: 500; padding: 8px 12px; text-align: left; background: #fafaf9; }
  .prog-table td { padding: 8px 12px; font-size: 13px; border-top: 1px solid #f0efec; }
  .prog-input { width: 58px; padding: 4px 6px; font-size: 13px; border: 1px solid #e5e4e0; border-radius: 6px; text-align: center; background: #fafaf9; color: #1a1a18; }

  .history-item { background: #fff; border-radius: 12px; border: 1px solid #e5e4e0; padding: 14px 16px; margin-bottom: 10px; }
  .history-date { font-size: 11px; color: #aaa; margin-bottom: 4px; }
  .history-label { font-size: 14px; font-weight: 600; }
  .history-empty { text-align: center; color: #aaa; font-size: 14px; padding: 60px 0; }

  .toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: #1a1a18; color: #fff; padding: 10px 18px; border-radius: 20px; font-size: 13px; font-weight: 500; opacity: 0; transition: opacity 0.3s; pointer-events: none; white-space: nowrap; z-index: 100; }
  .toast.show { opacity: 1; }
</style>
</head>
<body>

<div class="header">
  <h1>gym tracker</h1>
  <span class="today-date" id="header-date"></span>
</div>

<div class="tab-bar">
  <button class="tab active" onclick="showView('today')">today</button>
  <button class="tab" onclick="showView('programme')">programme</button>
  <button class="tab" onclick="showView('history')">history</button>
</div>

<div id="view-today" class="view active"></div>
<div id="view-programme" class="view"></div>
<div id="view-history" class="view"></div>

<div class="toast" id="toast"></div>

<script>
const DAY_KEYS = ['day1','day2','day3','day4','day5','day6','day7'];
const DAY_LABELS = {
  day1: 'lower, squat', day2: 'upper, push/pull',
  day3: 'rest', day4: 'lower, hinge',
  day5: 'upper, vertical + arms', day6: 'rest', day7: 'rest'
};
const REST_DAYS = new Set(['day3','day6','day7']);

let currentDay = 'day1';
let today = new Date().toISOString().split('T')[0];
let sessionData = {};
let programmeData = {};
let adaptSuggestions = [];

document.getElementById('header-date').textContent = today;

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function showView(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('view-' + name).classList.add('active');
  document.querySelectorAll('.tab').forEach(t => { if (t.textContent === name) t.classList.add('active'); });
  if (name === 'today') renderToday();
  if (name === 'programme') renderProgramme();
  if (name === 'history') renderHistory();
}

async function fetchProgramme(dayKey) {
  const res = await fetch(`/api/programme/${dayKey}`);
  return res.json();
}

async function fetchSession(dayKey) {
  const res = await fetch(`/api/session/${dayKey}?date=${today}`);
  return res.json();
}

async function selectDay(key) {
  currentDay = key;
  const [prog, sess] = await Promise.all([fetchProgramme(key), fetchSession(key)]);
  programmeData[key] = prog;
  sessionData[key] = {};
  sess.forEach(s => {
    const k = `${s.exercise}__${s.set_num}`;
    sessionData[key][k] = s;
  });
  adaptSuggestions = [];
  renderToday();
}

async function renderToday() {
  const container = document.getElementById('view-today');
  const isRest = REST_DAYS.has(currentDay);

  let pills = `<div class="day-pills">`;
  DAY_KEYS.forEach(k => {
    const rest = REST_DAYS.has(k) ? ' rest' : '';
    pills += `<button class="day-pill${k===currentDay?' active':''}${rest}" onclick="selectDay('${k}')">${k.replace('day','d')} ${DAY_LABELS[k]}</button>`;
  });
  pills += `</div>`;

  let banners = '';
  adaptSuggestions.forEach((s, i) => {
    banners += `<div class="adapt-banner">
      <div><div class="adapt-text">${s.exercise}</div><div class="adapt-sub">beat target — suggested ${s.suggested_weight}kg</div></div>
      <div class="adapt-actions">
        <button class="adapt-accept" onclick="acceptAdapt(${i})">accept</button>
        <button class="adapt-dismiss" onclick="dismissAdapt(${i})">dismiss</button>
      </div>
    </div>`;
  });

  if (isRest) {
    container.innerHTML = pills + banners + `<div class="rest-card">rest day. recover well.</div>`;
    return;
  }

  if (!programmeData[currentDay]) {
    await selectDay(currentDay);
    return;
  }

  const prog = programmeData[currentDay];
  let cards = '';
  prog.forEach(ex => {
    const note = [ex.unit, ex.note].filter(Boolean).join(' · ');
    cards += `<div class="exercise-card">
      <div class="exercise-name">${ex.exercise}</div>
      ${note ? `<div class="exercise-note">${note}</div>` : ''}
      <table class="sets-table">
        <thead><tr><th>set</th><th>reps</th><th>kg</th><th></th></tr></thead>
        <tbody>`;
    for (let s = 1; s <= ex.sets; s++) {
      const key = `${ex.exercise}__${s}`;
      const logged = (sessionData[currentDay] || {})[key] || {};
      const repsVal = logged.reps !== undefined ? logged.reps : (ex.reps || '');
      const weightVal = logged.weight !== undefined ? logged.weight : (ex.weight || '');
      const done = logged.done ? true : false;
      cards += `<tr>
        <td>${s}</td>
        <td><input class="set-input" type="number" value="${repsVal}" placeholder="—"
          oninput="logSet('${ex.exercise}',${s},'reps',this.value)"></td>
        <td><input class="set-input" type="number" value="${weightVal}" placeholder="BW"
          oninput="logSet('${ex.exercise}',${s},'weight',this.value)"></td>
        <td><button class="check-btn ${done?'done':''}" onclick="toggleSet('${ex.exercise}',${s},this)"></button></td>
      </tr>`;
    }
    cards += `</tbody></table></div>`;
  });

  const totalSets = prog.reduce((a,e) => a+e.sets, 0);
  const doneSets = Object.values(sessionData[currentDay]||{}).filter(s=>s.done).length;

  container.innerHTML = pills + banners + cards + `
    <div class="session-bar">
      <button class="complete-btn" onclick="completeSession()" ${doneSets===0?'disabled':''}>
        complete → obsidian
      </button>
      <span class="sets-progress">${doneSets}/${totalSets}</span>
    </div>`;
}

async function logSet(exercise, setNum, field, value) {
  const key = `${exercise}__${setNum}`;
  if (!sessionData[currentDay]) sessionData[currentDay] = {};
  if (!sessionData[currentDay][key]) sessionData[currentDay][key] = {};
  sessionData[currentDay][key][field] = value;
  sessionData[currentDay][key].exercise = exercise;
  sessionData[currentDay][key].set_num = setNum;

  await fetch('/api/session/set', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({
      date: today, day_key: currentDay,
      exercise, set_num: setNum,
      reps: sessionData[currentDay][key].reps || null,
      weight: sessionData[currentDay][key].weight || null,
      done: sessionData[currentDay][key].done ? 1 : 0
    })
  });
}

async function toggleSet(exercise, setNum, btn) {
  const key = `${exercise}__${setNum}`;
  if (!sessionData[currentDay]) sessionData[currentDay] = {};
  if (!sessionData[currentDay][key]) sessionData[currentDay][key] = {};
  const nowDone = !sessionData[currentDay][key].done;
  sessionData[currentDay][key].done = nowDone;
  btn.classList.toggle('done', nowDone);

  await fetch('/api/session/set', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({
      date: today, day_key: currentDay, exercise, set_num: setNum,
      reps: sessionData[currentDay][key].reps || null,
      weight: sessionData[currentDay][key].weight || null,
      done: nowDone ? 1 : 0
    })
  });

  const totalSets = programmeData[currentDay].reduce((a,e)=>a+e.sets,0);
  const doneSets = Object.values(sessionData[currentDay]).filter(s=>s.done).length;
  const btn2 = document.querySelector('.complete-btn');
  const prog = document.querySelector('.sets-progress');
  if (btn2) btn2.disabled = doneSets === 0;
  if (prog) prog.textContent = `${doneSets}/${totalSets}`;
}

async function completeSession() {
  const res = await fetch('/api/session/complete', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ date: today, day_key: currentDay })
  });
  const data = await res.json();

  const adaptRes = await fetch(`/api/adapt/${currentDay}?date=${today}`);
  adaptSuggestions = await adaptRes.json();

  showToast(data.ok ? 'session saved to obsidian' : 'saved locally — check github config');
  renderToday();
}

async function acceptAdapt(i) {
  const s = adaptSuggestions[i];
  await fetch('/api/adapt/accept', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ programme_id: s.programme_id, new_weight: s.suggested_weight })
  });
  programmeData[currentDay] = await fetchProgramme(currentDay);
  adaptSuggestions.splice(i, 1);
  showToast(`updated: ${s.exercise} → ${s.suggested_weight}kg`);
  renderToday();
}

function dismissAdapt(i) {
  adaptSuggestions.splice(i, 1);
  renderToday();
}

async function renderProgramme() {
  const container = document.getElementById('view-programme');
  let html = '';
  for (const key of DAY_KEYS) {
    if (REST_DAYS.has(key)) continue;
    const prog = await fetchProgramme(key);
    html += `<div class="prog-day">
      <div class="prog-day-title">${DAY_LABELS[key]}</div>
      <table class="prog-table">
        <thead><tr><th>exercise</th><th>sets</th><th>reps</th><th>weight</th></tr></thead>
        <tbody>`;
    prog.forEach(ex => {
      html += `<tr>
        <td>${ex.exercise}</td>
        <td><input class="prog-input" type="number" value="${ex.sets}" onchange="updateProg(${ex.id},'sets',this.value)"></td>
        <td><input class="prog-input" type="number" value="${ex.reps||''}" placeholder="—" onchange="updateProg(${ex.id},'reps',this.value)"></td>
        <td><input class="prog-input" type="number" value="${ex.weight||''}" placeholder="BW" onchange="updateProg(${ex.id},'weight',this.value)"></td>
      </tr>`;
    });
    html += `</tbody></table></div>`;
  }
  container.innerHTML = html;
}

async function updateProg(id, field, value) {
  await fetch(`/api/programme/${id}`, {
    method: 'PATCH',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ [field]: parseFloat(value) })
  });
  if (programmeData[currentDay]) {
    programmeData[currentDay] = await fetchProgramme(currentDay);
  }
}

async function renderHistory() {
  const container = document.getElementById('view-history');
  const res = await fetch('/api/history');
  const history = await res.json();
  if (!history.length) {
    container.innerHTML = `<div class="history-empty">no sessions logged yet.</div>`;
    return;
  }
  container.innerHTML = history.map(h => `
    <div class="history-item">
      <div class="history-date">${h.date}</div>
      <div class="history-label">${DAY_LABELS[h.day_key] || h.day_key}</div>
    </div>`).join('');
}

selectDay(currentDay);
</script>
</body>
</html>
