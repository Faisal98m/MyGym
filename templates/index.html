<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>MyGym</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<script src="{{ url_for('static', filename='app.js') }}" defer></script>
</head>
<body>

<div class="header">
  <div class="logo">MYGYM</div>
  <div class="date-badge" id="header-date"></div>
</div>

<div class="tabs tabs-main">
  <button class="tab active" data-view="today">today</button>
  <button class="tab" data-view="programme">programme</button>
  <button class="tab" data-view="history">history</button>
</div>

<div id="view-today" class="view active"></div>
<div id="view-programme" class="view"></div>
<div id="view-history" class="view"></div>

<div class="toast" id="toast"></div>

</body>
</html>
